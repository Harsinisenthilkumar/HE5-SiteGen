<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — HE5 SiteGen</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <style>
    body {
      background: var(--gradient-hero);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1.5rem 4rem;
    }
    .login-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-xl), 0 0 40px rgba(240, 121, 0, 0.05);
      animation: fadeInUp 0.6s ease-out;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-title {
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--white);
    }
    .login-subtitle {
      font-size: var(--text-sm);
      color: var(--text-muted);
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      color: var(--white);
      transition: var(--transition-base);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--orange);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 10px rgba(240, 121, 0, 0.15);
    }
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      font-size: var(--text-sm);
      margin-bottom: 1.25rem;
      display: none;
      animation: shake 0.3s ease-in-out;
    }
    .demo-creds {
      background: rgba(240, 121, 0, 0.05);
      border: 1px solid rgba(240, 121, 0, 0.15);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      margin-top: 1.5rem;
      font-size: var(--text-xs);
      color: var(--orange-light);
      line-height: 1.6;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-inner container-2xl" style="max-width:1440px;margin-inline:auto;padding-inline:2rem;">
      <a href="index.html" class="navbar-logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <span class="logo-text">HE5 <span>SiteGen</span></span>
      </a>
      <div class="navbar-actions">
        <a href="index.html" class="btn btn-secondary btn-sm">Home</a>
      </div>
    </div>
  </nav>

  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Sign In</h1>
        <p class="login-subtitle">Access the HE5 SiteGen Builder</p>
      </div>

      <div id="errorBox" class="error-box"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" required placeholder="admin@he5.com" />
        </div>
        <div class="form-group" style="margin-bottom: 1.75rem;">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-input" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; min-height: 50px;">Sign In</button>
      </form>

      <div class="demo-creds">
        <strong>Demo Presentation Account:</strong><br />
        Email: <code>admin@he5.com</code><br />
        Password: <code>admin123</code>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorBox = document.getElementById('errorBox');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';

      const email = emailInput.value;
      const password = passwordInput.value;

      const result = Auth.login(email, password);
      if (result.success) {
        window.location.href = 'builder.html';
      } else {
        errorBox.textContent = result.message;
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
